# Default hyperparameter grid (same tuning budget for every model/variant).
# 2*2*2*2*2 = 32 combinations x seeds. Use --max-runs to subsample.
grid:
  model.hidden_channels: [64, 128]
  model.num_layers: [2, 3]
  model.dropout: [0.3, 0.5]
  train.lr: [0.001, 0.005]
  train.weight_decay: [0.0001, 0.0005]
