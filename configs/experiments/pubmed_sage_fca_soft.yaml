# PubMed diagnostic (H5): soft intent-overlap membership instead of hard.
extends: [base.yaml, datasets/pubmed.yaml]
experiment: pubmed_sage_fca_soft
features:
  variant: fca_feat
  fca:
    k_concepts: 128
    scorer: support
    membership: soft
model:
  name: graphsage
  hidden_channels: 128
  num_layers: 2
  aggr: mean
